<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alwanu Game Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #16213e;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid #0f3460;
        }
        h1 {
            color: #e94560;
            margin-bottom: 5px;
            font-size: 2.5rem;
        }
        p {
            color: #95a5a6;
            margin-bottom: 30px;
        }
        .game-list {
            list-style: none;
            padding: 0;
        }
        .game-item {
            margin: 20px 0;
        }
        .game-link {
            text-decoration: none;
            color: #fff;
            background: #0f3460;
            padding: 15px 30px;
            border-radius: 12px;
            display: inline-block;
            transition: all 0.3s ease;
            min-width: 250px;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid transparent;
        }
        .game-link:hover {
            background: #e94560;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            border: 1px solid #fff;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #4e5e7e;
            letter-spacing: 1px;
        }
        strong {
            color: #e94560;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 Game Hub</h1>
        <p>Selamat datang! Pilih tantanganmu hari ini:</p>
        
        <ul class="game-list">
            <li class="game-item">
                <a href="https://game.alwanuzr.me/animal.html" class="game-link">🐾 Animal Dash Race</a>
            </li>
            <li class="game-item">
                <a href="https://game.alwanuzr.me/magic-chess.html" class="game-link">♟️ Catur (Magic Chess)</a>
            </li>
        </ul>

        <div class="footer">
            CREDIT BY <strong>ALWANU ZAKY RAIHAN</strong>
        </div>
    </div>

</body>
</html>
